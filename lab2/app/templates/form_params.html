{% extends 'base.html' %}

{% block content %}
<h1 class="mt-5 text-center">Параметры формы</h1>

<div class="row mt-4">
    <div class="col-md-6 offset-md-3">
        <div class="card mb-4">
            <div class="card-header bg-info text-white">
                <h5 class="mb-0">Отправить данные формы</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label">Имя</label>
                        <input type="text" class="form-control" id="name" name="name" placeholder="Введите ваше имя">
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="Введите email">
                    </div>
                    <div class="mb-3">
                        <label for="message" class="form-label">Сообщение</label>
                        <textarea class="form-control" id="message" name="message" rows="3" placeholder="Введите сообщение"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Отправить</button>
                </form>
            </div>
        </div>

        {% if form_data %}
        <div class="card">
            <div class="card-header bg-success text-white">
                <h5 class="mb-0">Отправленные данные</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-bordered">
                        <thead>
                            <tr>
                                <th>Поле</th>
                                <th>Значение</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for key, value in form_data.items() %}
                            <tr>
                                <td><strong>{{ key }}</strong></td>
                                <td>{{ value if value else '<пусто>'|safe }}</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
